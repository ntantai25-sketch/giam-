<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bạn có muốn giảm cân không?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    height:100vh;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:linear-gradient(135deg,#ffd6e7,#ffeef7,#fff7fb);

}

/* tiêu đề */

h1{

    font-size:55px;

    margin-bottom:30px;

    animation:fade 1s;

}

.emoji{

    display:inline-block;

    animation:float 1.5s infinite;

}

/* nút */

button{

    padding:15px 35px;

    margin:10px;

    font-size:22px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    transition:.3s;

}

#yes{

    position:absolute;

    background:#ff4d6d;

    color:white;

}

#no{

    background:#2ecc71;

    color:white;

}

#no:hover{

    transform:scale(1.12);

}

/* animation */

@keyframes fade{

from{

opacity:0;

transform:translateY(-50px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@keyframes float{

0%{transform:translateY(0px);}

50%{transform:translateY(-8px);}

100%{transform:translateY(0px);}

}

/* trái tim */

.heart{

    position:absolute;

    bottom:-50px;

    font-size:25px;

    animation:fly linear forwards;

    pointer-events:none;

}

@keyframes fly{

from{

transform:translateY(0);

opacity:1;

}

to{

transform:translateY(-120vh);

opacity:0;

}

}

</style>

</head>

<body>

<h1>
Bạn có muốn giảm cân không?
<span class="emoji">🤔</span>
</h1>

<div>

<button id="yes">
Có
</button>

<button id="no">
Không
</button>

</div>

<script>

const yes=document.getElementById("yes");

function moveButton(){

    let x=Math.random()*(window.innerWidth-150);

    let y=Math.random()*(window.innerHeight-80);

    yes.style.left=x+"px";

    yes.style.top=y+"px";

}

yes.addEventListener("mouseover",moveButton);
yes.addEventListener("click",moveButton);
yes.addEventListener("touchstart",moveButton);

/* trái tim bay */

function createHeart(){

    let heart=document.createElement("div");

    heart.className="heart";

    heart.innerHTML="💖";

    heart.style.left=Math.random()*100+"vw";

    heart.style.animationDuration=
    (3+Math.random()*3)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);

}

setInterval(createHeart,300);

/* click Không */

document.getElementById("no").onclick=function(){

document.body.innerHTML=`

<div style="

height:100vh;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

background:linear-gradient(135deg,#ffd6e7,#fff);

animation:fade 1s;

">

<h1 style="font-size:70px;">
🎉 Chính xác 🎉
</h1>

<h2 style="margin-top:20px;">
❤️ Bạn hiện tại đã rất tuyệt rồi ❤️
</h2>

<h2 style="margin-top:15px;">
🥰 Hãy luôn tự tin vào bản thân nhé!
</h2>

<h1 style="margin-top:40px;">
💖💖💖
</h1>

</div>

`;

}

</script>

</body>
</html>
